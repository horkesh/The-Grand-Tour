
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>The Grand Tour</title>
    
    <!-- PWA & iOS Standalone Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grand Tour">
    <meta name="theme-color" content="#f9f7f4" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            padding: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
              'safe-left': 'env(safe-area-inset-left)',
              'safe-right': 'env(safe-area-inset-right)',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        html {
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            position: fixed;
            width: 100%;
            height: 100%;
            color: #1e293b; /* slate-800 default text */
        }
        .dark html, .dark body {
            color: #e2e8f0; /* slate-200 default text in dark mode */
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #f9f7f4;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            width: 100%;
            height: 100%;
            /* Prevent pull-to-refresh and horizontal swipe navigation */
            touch-action: pan-y;
        }
        .dark body {
            background-color: #000;
        }

        /* Prevent Safari overscroll bounce on all scrollable containers */
        * {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* 3D Flip Card utilities */
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Cinematic Grain Overlay */
        .grain-overlay {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
            animation: grain 8s steps(10) infinite;
        }
        @keyframes grain {
            0%, 100% { transform:translate(0, 0) }
            10% { transform:translate(-5%, -10%) }
            20% { transform:translate(-15%, 5%) }
            30% { transform:translate(7%, -25%) }
            40% { transform:translate(-5%, 25%) }
            50% { transform:translate(-15%, 10%) }
            60% { transform:translate(15%, 0%) }
            70% { transform:translate(0%, 15%) }
            80% { transform:translate(3%, 35%) }
            90% { transform:translate(-10%, 10%) }
        }

        /* Prevent iOS Zoom on Input */
        input, textarea, select {
            font-size: 16px !important;
        }

        .leaflet-container {
            background: #f9f7f4 !important;
            z-index: 1;
        }
        .dark .leaflet-container {
            background: #000 !important;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
        }
        
        /* User Location Marker (shared by OverviewMap & ItineraryMapOverlay) */
        .user-location-marker { position: relative; width: 24px; height: 24px; }
        .user-dot { position: absolute; top: 8px; left: 8px; width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 6px rgba(59,130,246,0.6); z-index: 2; }
        .user-pulse { position: absolute; top: 0; left: 0; width: 24px; height: 24px; background: rgba(59,130,246,0.25); border-radius: 50%; animation: user-ping 2s ease-out infinite; }
        @keyframes user-ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Live position pulse on /live page */
        @keyframes gtour-live-ping { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* Card Stagger Entrance (single element) */
        .stagger-enter {
            animation: staggerIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes staggerIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Micro-interaction: active button press feedback */
        button:active:not(:disabled) {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }

        /* Micro-interaction: smooth hover transitions on interactive elements */
        button, a, [role="button"] {
            transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.2s ease;
        }

        /* Glassmorphism utility classes */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Stagger animation utility for lists */
        .stagger-in > * {
            opacity: 0;
            transform: translateY(10px);
            animation: staggerFadeIn 0.4s ease forwards;
        }
        .stagger-in > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger-in > *:nth-child(2) { animation-delay: 0.1s; }
        .stagger-in > *:nth-child(3) { animation-delay: 0.15s; }
        .stagger-in > *:nth-child(4) { animation-delay: 0.2s; }
        .stagger-in > *:nth-child(5) { animation-delay: 0.25s; }
        .stagger-in > *:nth-child(6) { animation-delay: 0.3s; }
        .stagger-in > *:nth-child(7) { animation-delay: 0.35s; }
        .stagger-in > *:nth-child(8) { animation-delay: 0.4s; }
        .stagger-in > *:nth-child(9) { animation-delay: 0.45s; }
        .stagger-in > *:nth-child(10) { animation-delay: 0.5s; }

        @keyframes staggerFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Print-Ready Passport Styles */
        @media print {
            body { background: white !important; overflow: visible !important; }
            .grain-overlay { display: none !important; }
            #root > div { height: auto !important; overflow: visible !important; }
            #root > div > main { overflow: visible !important; }
            #root > div > main > div { overflow: visible !important; position: relative !important; }
            /* Hide nav, header, non-passport elements */
            nav, header, aside, .lg\\:flex.w-80,
            [role="complementary"],
            button:not(.print-visible) { display: none !important; }
            /* Passport page styling */
            .passport-print-area {
                display: block !important;
                width: 100% !important;
                padding: 20px !important;
                break-inside: avoid;
            }
            .passport-print-area .stamp-grid {
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 12px !important;
            }
            .passport-print-area h3 {
                color: #194f4c !important;
                border-bottom: 2px solid #194f4c !important;
                padding-bottom: 8px !important;
                margin-bottom: 16px !important;
                break-after: avoid;
            }
            .passport-stamp {
                border: 2px solid #194f4c !important;
                border-radius: 8px !important;
                padding: 8px !important;
                text-align: center !important;
                break-inside: avoid;
            }
            .passport-stamp.collected {
                background: #f0fdf4 !important;
                border-color: #059669 !important;
            }
            @page {
                size: A4;
                margin: 1.5cm;
            }
        }

        /* Respect reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .grain-overlay { display: none; }
            button:active:not(:disabled) { transform: none; }
            .stagger-in > * { animation: none; opacity: 1; transform: none; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "zustand/": "https://esm.sh/zustand@^5.0.11/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0"
  }
}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
// Service worker has been causing stale-cache issues on family iPhones —
// unregister any previously-installed SW so every load hits the network fresh.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then((regs) => {
    regs.forEach((reg) => reg.unregister().catch(() => { /* ignore */ }));
  }).catch(() => { /* ignore */ });
  if (window.caches) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => { /* ignore */ });
  }
}
</script>
</head>
<body class="bg-[#f9f7f4] dark:bg-black">
    <div class="grain-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
