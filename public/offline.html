<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grand Tour — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #f9f7f4;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: #194f4c;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #194f4c;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#9992;&#65039;</div>
    <h1>Sei Offline</h1>
    <p>It looks like you've lost your connection. Your saved stamps and postcards are safe — they'll be here when you reconnect.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
